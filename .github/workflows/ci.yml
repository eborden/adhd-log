name: CI

# Quality gate runs on every PR and every push to main. The signed Android APK and the
# unsigned iOS Simulator build are produced only on pushes to main, gated behind the gate.
on:
  push:
    branches: [main]
  pull_request:

# A newer push to the same ref supersedes an in-flight run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Quality gate + native fingerprint (shared cache key for the build jobs).
  # ---------------------------------------------------------------------------
  check:
    runs-on: ubuntu-latest
    outputs:
      fp: ${{ steps.fingerprint.outputs.fp }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          HUSKY: 0 # git hooks are irrelevant in CI

      - name: Quality gate
        run: npm run check

      # The @expo/fingerprint hash of the *native* inputs (same ignorePaths as
      # scripts/build-apk.mjs). Identical hash => native tree is byte-identical =>
      # the cached native build is valid. Exposed so both build jobs key off it.
      - name: Compute native fingerprint
        id: fingerprint
        run: |
          FP=$(node -e "import('@expo/fingerprint').then(m=>m.createFingerprintAsync(process.cwd(),{ignorePaths:['android/**','ios/**']})).then(r=>console.log(r.hash))")
          echo "native fingerprint: $FP"
          echo "fp=$FP" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # Signed Android release APK.
  # ---------------------------------------------------------------------------
  android:
    needs: check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        id: setup-node
        with:
          node-version-file: .nvmrc
          cache: npm

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      # Caches ~/.gradle deps + the Gradle distribution, and (since this action's default
      # "enhanced" caching covers it) the local Gradle build cache at
      # ~/.gradle/caches/build-cache-1 — see the --build-cache flag below and docs/CI.md.
      - uses: gradle/actions/setup-gradle@v5

      - name: Install dependencies
        run: npm ci
        env:
          HUSKY: 0

      # Content-addressed compiler cache for the native C++ compile. This replaces the old
      # fingerprint-gated cache of the whole android/ tree, which preserved compiled outputs
      # keyed by mtime — and `npm ci` above restamps node_modules *after* any tree restore,
      # so ninja treated every object as stale and recompiled regardless. ccache keys on
      # preprocessed source content instead, so the mtime churn is irrelevant and the compile
      # collapses into cache hits. The launcher wiring lives in gradle/ccache.init.gradle;
      # see docs/CI.md. The action installs ccache, restores ~/.ccache, and saves it post-job.
      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: ${{ runner.os }}-android-ccache
          max-size: 1G

      # No fingerprint gate anymore: prebuild is cheap (a few seconds) and always running it
      # keeps the tree drift-free by construction. The expensive part — the C++ compile —
      # is handled by ccache above rather than by preserving the android/ build tree.
      - name: Prebuild (Android)
        run: npx expo prebuild --platform android --clean

      # credentials/ is gitignored, so the keystore never lives in the repo — it is
      # reconstructed from the base64 secret only for this build.
      - name: Decode signing keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          mkdir -p credentials
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > credentials/adhd-log-release.jks

      # Mirrors docs/BUILD.md's manual sequence (minus `adb install`). The release
      # signingConfig injected by plugins/withReleaseSigning.ts activates only when these
      # ADHDLOG_* Gradle properties are present. ADHDLOG_CCACHE + the init script route every
      # module's CMake compile through ccache; COMPILERCHECK=content + BASEDIR/NOHASHDIR make
      # hits survive the NDK clang's absolute path and mtime varying across runners.
      # --build-cache turns on Gradle's own task-output cache (Kotlin/Java compile, resource
      # merging, dexing, the Expo Gradle plugins' own jar build, …) — the layer above the
      # native compile that ccache doesn't reach. It's keyed by task input *content* hashes,
      # same immunity to the npm-ci mtime churn that motivated ccache. See docs/CI.md.
      - name: Assemble release APK
        working-directory: android
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ADHDLOG_CCACHE: ccache
          CCACHE_COMPILERCHECK: content
          CCACHE_BASEDIR: ${{ github.workspace }}
          CCACHE_NOHASHDIR: 'true'
        run: |
          ./gradlew :app:assembleRelease \
            --build-cache \
            --init-script "$GITHUB_WORKSPACE/gradle/ccache.init.gradle" \
            -PADHDLOG_KEYSTORE_FILE="$GITHUB_WORKSPACE/credentials/adhd-log-release.jks" \
            -PADHDLOG_KEYSTORE_PASSWORD="$ANDROID_KEYSTORE_PASSWORD" \
            -PADHDLOG_KEY_ALIAS="$ANDROID_KEY_ALIAS" \
            -PADHDLOG_KEY_PASSWORD="$ANDROID_KEY_PASSWORD"

      - uses: actions/upload-artifact@v6
        with:
          name: adhd-log-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Unsigned iOS Simulator build (.app). Device install would need an Apple account.
  # ---------------------------------------------------------------------------
  ios:
    needs: check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        id: setup-node
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          HUSKY: 0

      # CocoaPods spec + downloaded-artifact cache (registry specs, and the prebuilt
      # xcframeworks CocoaPods downloads for React-Core-prebuilt/ReactNativeDependencies) —
      # independent of the native-tree cache removed below, so it stays.
      - name: Cache CocoaPods specs
        uses: actions/cache@v5
        with:
          path: |
            ~/Library/Caches/CocoaPods
            ~/.cocoapods
          key: cocoapods-${{ runner.os }}-${{ needs.check.outputs.fp }}
          restore-keys: |
            cocoapods-${{ runner.os }}-

      # Content-addressed compiler cache for the native Objective-C++/C++ compile — same
      # mechanism and rationale as the Android job (see ci.yml's android job and docs/CI.md).
      # RN ships first-class support for this: react_native_pods.rb reads USE_CCACHE=1 and
      # points CC/CXX/LD/LDPLUSPLUS at ccache-wrapping scripts during `pod install`, so no
      # Podfile edit is needed — just the env var, set below on the steps that invoke it.
      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: ${{ runner.os }}-ios-ccache
          max-size: 1G

      # No fingerprint gate: prebuild is what bakes the ccache CC/CXX build settings into the
      # generated Xcode project via `pod install`, so it must run every time to guarantee that
      # wiring is fresh — matching the Android job's reasoning. This also means the old
      # ios/-tree cache below it (Pods/ + DerivedData) is redundant: `--clean` wipes it
      # immediately, and Pod source files are consumed via `:path` from node_modules, so even
      # when it WAS being restored, DerivedData's reuse was already defeated by the same
      # npm-ci-restamps-node_modules-before-restore mtime problem the Android tree cache had
      # (confirmed from a CI log: every single Pod recompiled despite a reported cache hit).
      - name: Prebuild (iOS)
        env:
          USE_CCACHE: '1'
        run: npx expo prebuild --platform ios --clean

      # Discover the generated workspace + scheme (names derive from expo.name; don't
      # hardcode). Unsigned Release build for the simulator.
      #
      # xcodebuild does NOT forward the calling shell's environment into each compiler
      # subprocess — only actual Xcode build settings (confirmed from a CI log: CC and
      # CCACHE_BINARY, both build settings the pod-install Ruby wired in, showed up in the
      # per-file compile environment; a plain `env:` CCACHE_COMPILERCHECK/CCACHE_BASEDIR/
      # CCACHE_DIR did not, and never reached ccache at all). Worse, RN's ccache-clang.sh
      # wrapper unconditionally sets CCACHE_CONFIGPATH to its own bundled conf (no cache_dir)
      # *unless* it's already set — silently overriding the ccache-action's persisted
      # cache_dir and sending every compile to ccache's untracked, un-cached-by-CI default
      # directory. So every setting ccache needs goes into one file, passed in as the
      # CCACHE_CONFIGPATH *build setting* (not env) so it actually reaches the compiler.
      - name: Build for iOS Simulator
        run: |
          shopt -s nullglob
          CCACHE_CONF="$RUNNER_TEMP/ccache-ios.conf"
          printf '%s\n' \
            "cache_dir = $(ccache --get-config=cache_dir)" \
            "compiler_check = content" \
            "base_dir = $GITHUB_WORKSPACE" \
            "hash_dir = false" \
            "sloppiness = clang_index_store,file_stat_matches,include_file_ctime,include_file_mtime,ivfsoverlay,pch_defines,modules,system_headers,time_macros" \
            "file_clone = true" \
            "depend_mode = true" \
            "inode_cache = true" \
            > "$CCACHE_CONF"
          workspaces=(ios/*.xcworkspace)
          WORKSPACE="${workspaces[0]}"
          SCHEME=$(xcodebuild -workspace "$WORKSPACE" -list -json | node -e "let s='';process.stdin.on('data',d=>(s+=d)).on('end',()=>console.log(JSON.parse(s).workspace.schemes[0]))")
          echo "Building scheme '$SCHEME' from '$WORKSPACE'"
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphonesimulator \
            -derivedDataPath ios/build \
            CODE_SIGNING_ALLOWED=NO \
            CCACHE_CONFIGPATH="$CCACHE_CONF" \
            build

      - name: Package .app
        run: |
          shopt -s nullglob
          apps=(ios/build/Build/Products/Release-iphonesimulator/*.app)
          APP="${apps[0]}"
          echo "Packaging $APP"
          ditto -c -k --keepParent "$APP" adhd-log-sim.app.zip

      - uses: actions/upload-artifact@v6
        with:
          name: adhd-log-ios-sim
          path: adhd-log-sim.app.zip
          if-no-files-found: error
